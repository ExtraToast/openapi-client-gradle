openapi: 3.0.3
info:
  title: Sample Pets API
  version: 1.0.0
servers:
  - url: https://example.invalid
paths:
  /pets:
    get:
      tags:
        - Pets
      operationId: listPets
      responses:
        '200':
          description: Pets returned by the sample service.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
